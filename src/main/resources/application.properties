spring.profiles.active=local

server.servlet.contextPath=/spring-neo4j-demo

spring.neo4j.uri=bolt://${DB_HOST:localhost}:${DB_PORT}
spring.data.neo4j.database=${DB_NAME}
spring.neo4j.authentication.username=${DB_USERNAME}
spring.neo4j.authentication.password=${DB_PASSWORD}

logging.level.org.springframework.data.neo4j=DEBUG